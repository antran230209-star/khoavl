<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhoaVL - Xem Phim & Giải Trí</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { background-color: #0a0a0a; color: white; font-family: 'Inter', sans-serif; }
        .movie-card img { transition: transform 0.5s ease; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #e50914; }
    </style>
</head>
<body>

    <nav class="bg-[#111] border-b border-gray-800 sticky top-0 z-50 py-3">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <a href="#" class="text-3xl font-black text-red-600 tracking-tighter uppercase">KHOA<span class="text-white">VL</span></a>
            <div class="flex-1 max-w-xl mx-10 hidden md:block">
                <input type="text" placeholder="Tìm tên phim..." class="w-full bg-zinc-800 border-none rounded-full px-5 py-2 text-sm text-white outline-none focus:ring-2 focus:ring-red-600">
            </div>
            <div class="text-white"><i class="fa fa-user cursor-pointer hover:text-red-500"></i></div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <h2 class="text-xl font-bold mb-6 flex items-center">
            <span class="w-1.5 h-6 bg-red-600 mr-3 rounded-full"></span> PHIM MỚI CẬP NHẬT
        </h2>

        <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
    </div>

    <div id="video-modal" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="relative w-full max-w-5xl">
            <button onclick="closePlayer()" class="absolute -top-12 right-0 text-white text-4xl hover:text-red-600">&times;</button>
            <div class="aspect-video bg-black shadow-2xl rounded-lg overflow-hidden border border-gray-800">
                <iframe id="video-iframe" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
            </div>
            <h3 id="modal-title" class="text-2xl font-bold mt-6 text-white text-center"></h3>
        </div>
    </div>

    <script>
        /* HƯỚNG DẪN GẮN ẢNH JPG:
           1. Nếu dùng ảnh trên mạng: Dán link vào "thumb".
           2. Nếu dùng ảnh trong máy: 
              - Tạo thư mục tên là 'img' nằm cùng chỗ với file html này.
              - Chép ảnh vào đó (ví dụ: poster1.jpg).
              - Sửa thumb thành: "img/poster1.jpg"
        */
        const movies = [
            { 
                title: "nắc như gà", 
                thumb: "img/pp1.jpeg", // Tải ảnh về máy, bỏ vào thư mục img và sửa tên ở đây
                url: "https://www.youtube.com/embed/tbn", 
                year: "2024",
                quality: "HD"
            },
            { 
                title: "Phim Của Tôi 2", 
                thumb: "img/pp1.jpeg", 
                url: "https://www.youtube.com/embed/tbn", 
                year: "2024",
                quality: "HD"
            }
        ];

        const grid = document.getElementById('movie-grid');

        function renderMovies() {
            grid.innerHTML = movies.map((movie) => `
                <div class="movie-card group relative cursor-pointer overflow-hidden rounded-xl bg-zinc-900 border border-zinc-800 transition-all duration-300 hover:border-red-600 shadow-lg" 
                     onclick="openPlayer('${movie.url}', '${movie.title}')">
                    <div class="aspect-[2/3] overflow-hidden relative">
                        <img src="${movie.thumb}" alt="${movie.title}" class="w-full h-full object-cover group-hover:scale-110" onerror="this.src='https://via.placeholder.com/300x450?text=Loi+Anh'">
                        <span class="absolute top-2 left-2 bg-red-600 text-[10px] font-bold px-2 py-0.5 rounded">${movie.quality}</span>
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <div class="bg-red-600 w-12 h-12 rounded-full flex items-center justify-center shadow-red-600/50 shadow-2xl">
                                <i class="fa fa-play text-white ml-1 text-xl"></i>
                            </div>
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="text-sm font-bold text-white truncate group-hover:text-red-500 transition-colors uppercase tracking-tight">${movie.title}</h3>
                        <p class="text-xs text-gray-500 mt-1">${movie.year}</p>
                    </div>
                </div>
            `).join('');
        }

        function openPlayer(url, title) {
            document.getElementById('video-iframe').src = url + "?autoplay=1";
            document.getElementById('modal-title').innerText = title;
            document.getElementById('video-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closePlayer() {
            document.getElementById('video-modal').classList.add('hidden');
            document.getElementById('video-iframe').src = "";
            document.body.style.overflow = 'auto';
        }

        renderMovies();
    </script>
</body>
</html>
